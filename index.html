<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Azure Translator Dashboard</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h1>🌍 Azure Translator</h1>

    <!-- Azure Credentials -->
    <div class="credentials">
        <input type="text" id="endpoint" placeholder="Enter Endpoint">
        <input type="text" id="apiKey" placeholder="Enter API Key">
        <input type="text" id="region" placeholder="Enter Region">
    </div>

    <!-- Input -->
    <textarea id="inputText" placeholder="Enter text here..."></textarea>

    <!-- Language Selection -->
    <div class="selectors" id="selectors"></div>

    <button onclick="translateText()">Translate</button>

    <!-- Output -->
    <div id="output"></div>
</div>

<script src="script.js"></script>
</body>
</html>
