<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Azure Translator Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h1>🌍 Language Translator</h1>

    <textarea id="inputText" placeholder="Enter text here..."></textarea>

    <div class="selectors">
        <div class="lang">
            <img src="https://flagcdn.com/w40/us.png">
            <select id="lang1">
                <option value="en">English</option>
                <option value="hi">Hindi</option>
                <option value="fr">French</option>
                <option value="es">Spanish</option>
                <option value="ko">Korean</option>
            </select>
        </div>

        <div class="lang">
            <img src="https://flagcdn.com/w40/in.png">
            <select id="lang2">
                <option value="hi">Hindi</option>
                <option value="en">English</option>
                <option value="fr">French</option>
                <option value="es">Spanish</option>
                <option value="ko">Korean</option>
            </select>
        </div>

        <div class="lang">
            <img src="https://flagcdn.com/w40/fr.png">
            <select id="lang3">
                <option value="fr">French</option>
                <option value="en">English</option>
                <option value="hi">Hindi</option>
                <option value="es">Spanish</option>
                <option value="ko">Korean</option>
            </select>
        </div>

        <div class="lang">
            <img src="https://flagcdn.com/w40/es.png">
            <select id="lang4">
                <option value="es">Spanish</option>
                <option value="en">English</option>
                <option value="hi">Hindi</option>
                <option value="fr">French</option>
                <option value="ko">Korean</option>
            </select>
        </div>

        <div class="lang">
            <img src="https://flagcdn.com/w40/kr.png">
            <select id="lang5">
                <option value="ko">Korean</option>
                <option value="en">English</option>
                <option value="hi">Hindi</option>
                <option value="fr">French</option>
                <option value="es">Spanish</option>
            </select>
        </div>
    </div>

    <button onclick="translateText()">Translate</button>

    <div id="output"></div>
</div>

<script src="script.js"></script>
</body>
</html>
